# Fans
###################################################################################
#pin:
#max_power: 1.0
#shutdown_speed: 0
#   is 0.
#cycle_time: 0.010
#hardware_pwm: False
#kick_start_time: 0.100
#min_power: 0.0
#tachometer_pin:
#tachometer_ppr: 2
#tachometer_poll_interval: 0.0015
#enable_pin:
#off_below:
#initial_speed:

[heater_fan heatbreak_cooling_fan]
pin: PA8

[multi_pin part_cooling_fans]
pins: PE5, PD12  # Replace these with your specific fan pins (e.g., FAN0 and FAN1)
# # Part cooling fan #01
# [fan_generic fan1]
# pin: PE5
# # Part cooling fan #02
# [fan_generic fan2]
# pin: PD12
[fan]
pin: multi_pin:part_cooling_fans
# You can still use standard fan parameters here:
max_power: 1.0
#kick_start_time: 0.5
#off_below: 0.10

[fan_generic Bed_Fans]
pin: PD13 ### < ADD YOUR OWN PIN HERE
max_power: 1.0
shutdown_speed: 0
kick_start_time: 0.5
#off_below: 0.20

# [output_pin DISABLE_BED_FANS]
# pin: PD13 ### < ADD YOUR OWN PIN HERE

[multi_pin electronics_cooling_fans]
pins: PD14, PD15  # Replace these with your specific fan pins (e.g., FAN0 and FAN1)
# # Part cooling fan #01
# [fan_generic fan1]
# pin: PE5
# # Part cooling fan #02
# [fan_generic fan2]
# pin: PD12
[controller_fan electronics_cooling]
pin: multi_pin:electronics_cooling_fans
max_power: 1.0
kick_start_time: 0.5
# This links the fan to your movement and extrusion
stepper: stepper_x, stepper_y, stepper_z, stepper_z1,stepper_z2, extruder
# Keeps fans running for 60 seconds after the print ends
idle_timeout: 60
# Optional: runs fans at a low, silent speed when motors are on but idle
# idle_speed: 0.3

# [fan_generic heater02_as_fan]
# pin: PA3
# #tachometer_pin: PC2

[controller_fan A/B_Motor_Fans]
pin: PB10
# The fan will turn on whenever these specific steppers are active:
stepper: stepper_x, stepper_y
max_power: 1.0
kick_start_time: 0.5
# The fan will stay on for this many seconds after the motors stop:
idle_timeout: 30
# Optional: The fan speed when the motors are energized but not moving:
# idle_speed: 0.4

[fan_generic Auxiliary_Part_Cooling_Fans]
pin: PB11
#tachometer_pin: PC2

