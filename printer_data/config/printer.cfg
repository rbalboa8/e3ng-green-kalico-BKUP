# This file contains common pin mappings for the BigTreeTech Octopus
# (non-Pro) boards.

# Important! Do not use this config with an Octopus Pro v1.1 board as
# doing so could result in a heater being inadvertently enabled.

# This file contains common pin mappings for the BIGTREETECH Octopus V1.1.
# To use this config, the firmware should be compiled for the
# STM32F446
# Enable
# low-level configuration options
# 32KiB bootloader
# 12 MHz crystal
# and one of:
# Communication interface: "USB (on PA11/PA12)",
# Communication interface: "CAN bus (on PD0/PD1)", or
# Communication interface: "USB to CAN bus bridge (USB on PA11/PA12))" and CAN bus interface: "CAN bus (on PD0/PD1)".

# Compiling the board firmware
# cd klipper
# make menuconfig
# make clean
# make
# mv out/klipper.bin out/firmware.bin
# sudo service klipper stop
# 
# Hold the DFU button on the board (BOOT0) and press reset button on the board.
# lsusb
#
# take note of the DFU device, e.g. DEVICE=0483:df11
#
# make flash FLASH_DEVICE=0483:df11
# ls /dev/serial/by-id
# sudo service klipper start
#

# Compile/upgrade Raspberry Pi MCU Firmware
#
# cd ~/klipper/
# sudo cp ./scripts/klipper-mcu.service /etc/systemd/system/
# sudo systemctl enable klipper-mcu.service
# make menuconfig
#
# Choose micro-controller Architecture (Linux process)
# Quit and save
#
# make clean
# sudo service klipper stop
# make flash
# sudo systemctl start klipper-mcu.service
# sudo service klipper start

# Firmware update:
# sudo service klipper stop
# cd ~/klipper
# make menuconfig
# make -j4
# Put in DFU mode
# lsusb
# make flash FLASH_DEVICE=0483:df11
# sudo service klipper start
# Note:
# File downloaded successfully
# dfu-util: Error during download get_status

# Demon_Klipper_Essentials_Unified Notes
# https://github.com/3DPrintDemon/Demon_Klipper_Essentials_Unified/tree/main

# Install progress checker:
# sh ~/printer_data/config/Demon_Klipper_Essentials_Unified/Other_Files/Demon_Diagnostics/Demon_Diagnostics.sh

# Updating User config files:
# Original commands:
# python3 -m pip install rich
# python3 -m pip install ConfigUpdater

# Workarounds:
# ~/klippy-env/bin/pip install rich
# ~/klippy-env/bin/python3 -m pip install ConfigUpdater
# ~/klippy-env/bin/python3 ~/printer_data/config/Demon_Klipper_Essentials_Unified/Other_Files/Demon_Install_Script/Demon_config_update.py

# Not needed:
# /home/pi/klippy-env/bin/python3 -m pip install --upgrade pip

# Useful Information:
# Pin names may be preceded by ! to indicate that a reverse polarity should be used (eg, trigger on low instead of high).
# Input pins may be preceded by ^ to indicate that a hardware pull-up resistor should be enabled for the pin.
#
# Comment multiple line "command + /"

[include mainsail.cfg]

[include ./Demon_Klipper_Essentials_Unified/*.cfg]
[include ./Demon_User_Files/*.cfg]
[include ./KAMP_LiTE/*.cfg]
[include ./Heat_Soak_Toolhead_LEDs.cfg]
[include ./My_Macros.cfg]
[include ./Neopixel_Control.cfg]
[include ./Demon_Klipper_Essentials_Unified/Other_Files/Demon_User_Files_Updater/Demon_User_Files_Handler_v*.cfg]

