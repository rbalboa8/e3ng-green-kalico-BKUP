###################################################################################
# TMC Driver Configuration
###################################################################################
[tmc2209 stepper_x]
uart_pin: PC4
interpolate: False # Allows TMC2209 to microstep up to 256 steps. Can introduce inarruracies so recommended to be off
run_current: 1.13
#run_current: 1.00 # 50% of the TMC2209 Constant recommended current Max <1.3v
sense_resistor: 0.110
#stealthchop_threshold: 999999
stealthchop_threshold: 0


[tmc2209 stepper_y]
uart_pin: PD11
interpolate: False # Allows TMC2209 to microstep up to 256 steps. Can introduce inarruracies so recommended to be off
run_current: 1.13
#run_current: 1.00 # 50% of the TMC2209 Constant recommended current Max <1.3v
sense_resistor: 0.110
#stealthchop_threshold: 999999
stealthchop_threshold: 0

[tmc2209 stepper_z]
uart_pin: PC6
interpolate: False # Allows TMC2209 to microstep up to 256 steps. Can introduce inarruracies so recommended to be off
# run_current: 0.580 # Original BTT config value
# run_current: 0.50 # Set to 45% of the motors rated constant max rating
run_current: 0.65 # 50% of the TMC2209 Constant recommended current Max <1.3v
sense_resistor: 0.110
#stealthchop_threshold: 999999
stealthchop_threshold: 0

# [tmc2209 stepper_z1]
# uart_pin: PG11
# interpolate: False # Allows TMC2209 to microstep up to 256 steps. Can introduce inarruracies so recommended to be off
# #diag_pin: P1.25
# #run_current: 0.850
# # run_current: 0.580 # Original BTT config value
# # run_current: 0.50 # Set to 45% of the motors rated constant max rating
# run_current: 0.65 # 50% of the TMC2209 Constant recommended current Max <1.3v
# sense_resistor: 0.110
# #stealthchop_threshold: 999999
# stealthchop_threshold: 0

# [tmc2209 stepper_z2]
# uart_pin: PG11
# interpolate: False # Allows TMC2209 to microstep up to 256 steps. Can introduce inarruracies so recommended to be off
# #diag_pin: P1.25
# #run_current: 0.850
# # run_current: 0.580 # Original BTT config value
# # run_current: 0.50 # Set to 45% of the motors rated constant max rating
# run_current: 0.65 # 50% of the TMC2209 Constant recommended current Max <1.3v
# sense_resistor: 0.110
# #stealthchop_threshold: 999999
# stealthchop_threshold: 0

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z1]
uart_pin: PF2
interpolate: false
run_current: 0.65
sense_resistor: 0.110
stealthchop_threshold: 0

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z2]
uart_pin: PC7
interpolate: false
run_current: 0.65
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 extruder]
uart_pin: PE4
interpolate: False # Allows TMC2209 to microstep up to 256 steps. Can introduce inarruracies so recommended to be off
#run_current: 0.79 # ZeroG 80% Run Current suggestion
#run_current: 0.85 # LDO Instructions Run Current suggestion
run_current: 0.60
#hold_current: 0.100
sense_resistor: 0.110
stealthchop_threshold: 0
driver_TBL: 0
driver_HEND: 6
driver_HSTRT:7
driver_TOFF: 4

